<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoServe — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-50 to-slate-200">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100">

    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-slate-800">Welcome Back</h2>
        <p class="text-slate-500 mt-2">Please enter your details</p>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
            <input id="email" type="email"
                   class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                   placeholder="name@company.com">
        </div>

        <div>
            <div class="flex justify-between mb-1">
                <label class="block text-sm font-medium text-slate-700">Password</label>
            </div>
            <input id="password" type="password"
                   class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                   placeholder="••••••••">
        </div>

        <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

        <button id="loginBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md shadow-blue-200 transition-all active:scale-[0.98] disabled:opacity-70">
            Login
        </button>
    </div>

    <p class="text-center text-slate-500 text-sm mt-8">
        Don't have an account?
        <a href="register.html" class="text-blue-600 font-medium hover:underline">Sign up</a>
    </p>
</div>

<script type="module">
    import Auth from "../js/auth.js";

    document.getElementById("loginBtn").addEventListener("click", async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");
        const errorMsg = document.getElementById("errorMsg");

        errorMsg.classList.add("hidden");

        if (!email || !password) {
            errorMsg.innerText = "Please enter email and password.";
            errorMsg.classList.remove("hidden");
            return;
        }

        try {
            btn.innerText = "Signing in...";
            btn.disabled = true;
            await Auth.login(email, password);
        } catch (err) {
            errorMsg.innerText = "Invalid email or password.";
            errorMsg.classList.remove("hidden");
            btn.innerText = "Login";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
