<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import AI from "../js/ai.js";

window.predict = async () => {
    const res = await AI.predict(
        mileage.value,
        year.value,
        service.value
    );

    result.innerText = res.result;
};
</script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded shadow w-96">

<h2 class="text-xl font-bold mb-4">AI Prediction</h2>

<input id="mileage" class="border p-2 w-full mb-2" placeholder="Mileage">
<input id="year" class="border p-2 w-full mb-2" placeholder="Year">
<input id="service" class="border p-2 w-full mb-4" placeholder="Service Count">

<button onclick="predict()" class="bg-blue-600 text-white w-full py-2 rounded">
Predict
</button>

<p id="result" class="mt-4 font-bold"></p>

</div>

</body>
</html>
