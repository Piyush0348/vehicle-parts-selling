<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoServe | Purchase & Service History</title>
    <link rel="stylesheet" href="../css/customer-history.css">
    <link rel="stylesheet" href="../css/customer-portal.css">
</head>
<body>
    <nav></nav>

    <main>
        <header>
            <h1>Purchase &amp; Service History</h1>
        </header>

        <section id="customer-info-section">
            <div id="customer-info-card">
                <div id="customer-avatar"></div>
                <div id="customer-details">
                    <p id="customer-name">—</p>
                    <p id="customer-email">—</p>
                    <p id="customer-phone">—</p>
                </div>
                <div id="stats-row">
                    <div class="stat-box">
                        <span class="stat-value" id="stat-orders">0</span>
                        <span class="stat-label">Orders</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="stat-spent">Rs. 0.00</span>
                        <span class="stat-label">Total Spent</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="stat-vehicles">0</span>
                        <span class="stat-label">Vehicles</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="stat-services">0</span>
                        <span class="stat-label">Service Visits</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="stat-service-cost">Rs. 0.00</span>
                        <span class="stat-label">Service Cost</span>
                    </div>
                </div>
            </div>
        </section>

        <div id="tab-bar">
            <button class="tab-btn active" id="tab-purchases" type="button">
                Purchase History
            </button>
            <button class="tab-btn" id="tab-vehicles" type="button">
                Vehicles &amp; Services
            </button>
        </div>

        <section id="purchases-section">
            <table id="purchases-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="purchases-tbody"></tbody>
            </table>
            <p id="no-purchases-msg">No purchase history found.</p>
        </section>

        <section id="order-detail-section">
            <h2>Order <span id="order-detail-id"></span> — Items</h2>
            <table>
                <thead>
                    <tr>
                        <th>Part Name</th>
                        <th>Unit Price</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="order-items-tbody"></tbody>
            </table>
            <button id="close-detail-btn" type="button">← Back to Orders</button>
        </section>

        <section id="vehicles-section">
            <div id="vehicle-list"></div>
            <p id="no-vehicles-msg">No vehicles registered.</p>
        </section>

        <p id="error-msg"></p>
        <p id="success-msg"></p>
    </main>

    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/customer-history.js"></script>
</body>
</html>
