<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
<script src="../js/app.js"></script>
</head>
<body>

<div class="container">
    <h2>Categories</h2>

    <input id="name" placeholder="Category Name">
    <button onclick="add()">Add</button>

    <ul id="list"></ul>
</div>

<script>
function load() {
    fetch(API + "/categories")
    .then(res => res.json())
    .then(data => {
        list.innerHTML = "";
        data.forEach(c => {
            list.innerHTML += `<li>${c.name}</li>`;
        });
    });
}

function add() {
    fetch(API + "/categories", {
        method: "POST",
        headers: authHeader(),
        body: JSON.stringify({ name: name.value })
    }).then(load);
}

load();
</script>

</body>
</html>
