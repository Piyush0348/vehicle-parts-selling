<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoServe | Purchase Invoice</title>
    <meta name="description" content="Admin purchase invoice — restock inventory from suppliers.">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .invoice-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
        @media (max-width: 900px) { .invoice-layout { grid-template-columns: 1fr; } }
        .invoice-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; }
        .invoice-card-header { padding: 1rem 1.25rem; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .invoice-card-header h2 { font-size: 0.9rem; font-weight: 700; color: #334155; }
        .invoice-card-body { padding: 1.25rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
        .form-field { display: flex; flex-direction: column; gap: 0.3rem; }
        .form-field label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        .form-field select, .form-field input { padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.875rem; color: #1e293b; background: #f8fafc; width: 100%; box-sizing: border-box; }
        .form-field select:focus, .form-field input:focus { border-color: #3b82f6; outline: none; background: #fff; }
        #items-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        #items-table th { text-align: left; padding: 0.5rem 0.6rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; border-bottom: 1px solid #e2e8f0; }
        #items-table td { padding: 0.55rem 0.6rem; border-bottom: 1px solid #f1f5f9; color: #334155; vertical-align: middle; }
        #items-table input[type=number] { width: 70px; padding: 0.3rem 0.5rem; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.82rem; }
        .remove-item-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; }
        .remove-item-btn:hover { color: #b91c1c; }
        .summary-line { display: flex; justify-content: space-between; font-size: 0.875rem; color: #475569; padding: 0.4rem 0; border-bottom: 1px solid #f1f5f9; }
        .summary-line.total { font-weight: 800; color: #0f172a; font-size: 1rem; border-bottom: none; }
        #success-msg { display:none; background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; }
        #error-msg { display:none; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; }
        .empty-items { color: #94a3b8; font-size: 0.85rem; padding: 1rem 0; text-align: center; }
    </style>
</head>
<body>

<nav></nav>
<script type="module" src="../js/navbar.js"></script>

<main>
    <header>
        <h1>Purchase Invoice</h1>
        <p style="color:#64748b; margin-top:0.25rem; font-size:0.95rem;">Restock inventory by recording a purchase from a supplier.</p>
    </header>

    <p id="success-msg"></p>
    <p id="error-msg"></p>

    <div class="invoice-layout">
        <!-- Left: Part Selection -->
        <div>
            <div class="invoice-card" style="margin-bottom:1.25rem">
                <div class="invoice-card-header">
                    <h2>Supplier & Part Selection</h2>
                </div>
                <div class="invoice-card-body">
                    <div class="form-field" style="margin-bottom:1rem">
                        <label>Supplier</label>
                        <select id="supplier-select">
                            <option value="">— Select Supplier —</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label>Part / Product</label>
                            <select id="product-select" disabled>
                                <option value="">— Select part —</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label>Quantity to Add</label>
                            <input type="number" id="qty-input" min="1" value="1" placeholder="Qty">
                        </div>
                    </div>
                    <button class="btn" id="add-item-btn" style="margin-top:0.75rem">+ Add to Invoice</button>
                </div>
            </div>

            <!-- Items Table -->
            <div class="invoice-card">
                <div class="invoice-card-header">
                    <h2>Invoice Line Items</h2>
                    <span id="item-count" style="font-size:0.78rem; color:#94a3b8; font-weight:600">0 items</span>
                </div>
                <div class="invoice-card-body" style="padding:0">
                    <table id="items-table">
                        <thead>
                            <tr>
                                <th>Part Name</th>
                                <th>SKU</th>
                                <th>Current Stock</th>
                                <th>Add Qty</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="items-tbody">
                            <tr><td colspan="5" class="empty-items">No items added yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Right: Invoice Summary -->
        <div>
            <div class="invoice-card">
                <div class="invoice-card-header">
                    <h2>Invoice Summary</h2>
                </div>
                <div class="invoice-card-body">
                    <div class="form-field" style="margin-bottom:1rem">
                        <label>Invoice Date</label>
                        <input type="date" id="invoice-date">
                    </div>
                    <div class="form-field" style="margin-bottom:1rem">
                        <label>Notes (Optional)</label>
                        <input type="text" id="invoice-notes" placeholder="e.g. Monthly restock">
                    </div>
                    <hr style="border:none; border-top:1px solid #e2e8f0; margin:1rem 0">
                    <div class="summary-line"><span>Supplier</span><span id="sum-supplier">—</span></div>
                    <div class="summary-line"><span>Total Parts</span><span id="sum-parts">0 items</span></div>
                    <div class="summary-line"><span>Total Qty Added</span><span id="sum-qty">0 units</span></div>
                    <br>
                    <button class="btn" id="submit-invoice-btn" style="width:100%">Submit Purchase Invoice</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script type="module">
import API from "../js/api.js";
import Auth from "../js/auth.js";

if (!Auth.isAuthenticated() || Auth.getRole() !== "Admin") {
    window.location.href = "login.html";
}

// Set today's date
document.getElementById("invoice-date").value = new Date().toISOString().split("T")[0];

let suppliers = [];
let allProducts = [];
let invoiceItems = []; // { productId, name, sku, currentStock, qty }

const supplierSelect = document.getElementById("supplier-select");
const productSelect = document.getElementById("product-select");
const qtyInput = document.getElementById("qty-input");
const tbody = document.getElementById("items-tbody");
const successMsg = document.getElementById("success-msg");
const errorMsg = document.getElementById("error-msg");

function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.style.display = "block";
    errorMsg.style.display = "none";
    setTimeout(() => successMsg.style.display = "none", 5000);
}
function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
    successMsg.style.display = "none";
}

// Load suppliers
async function loadSuppliers() {
    try {
        suppliers = await API.get("/suppliers");
        supplierSelect.innerHTML = `<option value="">— Select Supplier —</option>` +
            suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
    } catch (e) { showError("Failed to load suppliers."); }
}

// Load products for selected supplier
async function loadProductsForSupplier(supplierId) {
    productSelect.innerHTML = `<option value="">Loading...</option>`;
    productSelect.disabled = true;
    try {
        allProducts = await API.get("/products");
        const filtered = allProducts.filter(p => p.supplierId == supplierId);
        if (filtered.length === 0) {
            productSelect.innerHTML = `<option value="">No products for this supplier</option>`;
        } else {
            productSelect.innerHTML = `<option value="">— Select part —</option>` +
                filtered.map(p => `<option value="${p.id}" data-sku="${p.sku}" data-stock="${p.stockQty}">${p.name} (Stock: ${p.stockQty})</option>`).join("");
            productSelect.disabled = false;
        }
    } catch (e) { showError("Failed to load products."); }
}

supplierSelect.addEventListener("change", () => {
    const id = supplierSelect.value;
    document.getElementById("sum-supplier").textContent = id ? supplierSelect.options[supplierSelect.selectedIndex].text : "—";
    if (id) {
        loadProductsForSupplier(id);
    } else {
        productSelect.innerHTML = `<option value="">— Select part —</option>`;
        productSelect.disabled = true;
    }
});

// Add item to invoice
document.getElementById("add-item-btn").addEventListener("click", () => {
    const supplierId = supplierSelect.value;
    if (!supplierId) { showError("Please select a supplier first."); return; }

    const productOpt = productSelect.options[productSelect.selectedIndex];
    const productId = productSelect.value;
    if (!productId) { showError("Please select a product."); return; }

    const qty = parseInt(qtyInput.value);
    if (!qty || qty < 1) { showError("Quantity must be at least 1."); return; }

    // Check if already in invoice
    const existing = invoiceItems.find(i => i.productId == productId);
    if (existing) {
        existing.qty += qty;
    } else {
        invoiceItems.push({
            productId: parseInt(productId),
            name: productOpt.text.split(" (Stock:")[0],
            sku: productOpt.dataset.sku || "—",
            currentStock: parseInt(productOpt.dataset.stock) || 0,
            qty
        });
    }

    errorMsg.style.display = "none";
    renderItems();
    qtyInput.value = 1;
});

function renderItems() {
    if (invoiceItems.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-items">No items added yet.</td></tr>`;
    } else {
        tbody.innerHTML = invoiceItems.map((item, idx) => `
            <tr>
                <td>${item.name}</td>
                <td style="color:#94a3b8">${item.sku}</td>
                <td>${item.currentStock}</td>
                <td><input type="number" min="1" value="${item.qty}" onchange="updateQty(${idx}, this.value)"></td>
                <td><button class="remove-item-btn" onclick="removeItem(${idx})" title="Remove">✕</button></td>
            </tr>
        `).join("");
    }

    const totalQty = invoiceItems.reduce((a, b) => a + b.qty, 0);
    document.getElementById("item-count").textContent = `${invoiceItems.length} items`;
    document.getElementById("sum-parts").textContent = `${invoiceItems.length} items`;
    document.getElementById("sum-qty").textContent = `${totalQty} units`;
}

window.updateQty = function(idx, val) {
    invoiceItems[idx].qty = Math.max(1, parseInt(val) || 1);
    renderItems();
};

window.removeItem = function(idx) {
    invoiceItems.splice(idx, 1);
    renderItems();
};

// Submit invoice
document.getElementById("submit-invoice-btn").addEventListener("click", async () => {
    const supplierId = supplierSelect.value;
    if (!supplierId) { showError("Please select a supplier."); return; }
    if (invoiceItems.length === 0) { showError("Add at least one item to the invoice."); return; }

    const btn = document.getElementById("submit-invoice-btn");
    btn.disabled = true;
    btn.textContent = "Submitting...";

    const payload = {
        supplierId: parseInt(supplierId),
        items: invoiceItems.map(i => ({ productId: i.productId, quantity: i.qty }))
    };

    try {
        await API.post("/products/restock", payload);
        showSuccess(`Purchase invoice submitted! ${invoiceItems.length} product(s) restocked successfully.`);
        invoiceItems = [];
        renderItems();
        productSelect.innerHTML = `<option value="">— Select part —</option>`;
        productSelect.disabled = true;
        supplierSelect.value = "";
        document.getElementById("sum-supplier").textContent = "—";
    } catch (e) {
        const msg = e.message || "Failed to submit invoice. Please try again.";
        showError(msg);
    } finally {
        btn.disabled = false;
        btn.textContent = "Submit Purchase Invoice";
    }
});

loadSuppliers();
</script>
</body>
</html>
