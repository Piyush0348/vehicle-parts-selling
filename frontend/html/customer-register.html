<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Customer with Vehicles</title>
    <link rel="stylesheet" href="../css/customer-register.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Customer Registration Form</h1>
            <p class="subtitle">Register new customer with vehicle details</p>
        </header>

        <main class="registration-form-container">
            <form id="customerRegistrationForm">
                <!-- Customer Details Section -->
                <section class="form-section">
                    <h2>Customer Information</h2>
                    
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input 
                            type="text" 
                            id="firstName" 
                            name="firstName" 
                            placeholder="Enter first name"
                            required
                        >
                        <span class="error-message"></span>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input 
                            type="text" 
                            id="lastName" 
                            name="lastName" 
                            placeholder="Enter last name"
                            required
                        >
                        <span class="error-message"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter email address"
                            required
                        >
                        <span class="error-message"></span>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="Enter phone number (optional)"
                        >
                        <span class="error-message"></span>
                    </div>
                </section>

                <!-- Vehicle Details Section -->
                <section class="form-section">
                    <div class="section-header">
                        <h2>Vehicle Information</h2>
                        <button type="button" id="addVehicleBtn" class="btn-secondary">+ Add Vehicle</button>
                    </div>

                    <div id="vehiclesContainer">
                        <!-- Vehicle entries will be added here dynamically -->
                    </div>
                </section>

                <!-- Form Actions -->
                <section class="form-actions">
                    <button type="reset" class="btn-secondary">Clear Form</button>
                    <button type="submit" class="btn-primary">Register Customer</button>
                </section>
            </form>
        </main>

        <!-- Success/Error Message -->
        <div id="messageAlert" class="alert hidden"></div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="spinner hidden"></div>

    <script src="../js/customer-register.js"></script>
</body>
</html>
