<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoServe — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-50 to-slate-200 p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">

    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-slate-800">Create Account</h2>
        <p class="text-slate-500 mt-2">Register to get started</p>
    </div>

    <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
                <input id="fname" type="text"
                       class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                       placeholder="First Name">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
                <input id="lname" type="text"
                       class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                       placeholder="Last Name">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input id="email" type="email"
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                   placeholder="name@company.com">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input id="password" type="password"
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                   placeholder="••••••••">
        </div>

        <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

        <button id="regBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md shadow-blue-200 transition-all active:scale-[0.98] mt-2 disabled:opacity-70">
            Register
        </button>
    </div>

    <p class="text-center text-slate-500 text-sm mt-8">
        Already have an account?
        <a href="login.html" class="text-blue-600 font-medium hover:underline">Login</a>
    </p>
</div>

<script>
const API = "http://localhost:5033/api";

document.getElementById("regBtn").addEventListener("click", async () => {
    const btn = document.getElementById("regBtn");
    const errorMsg = document.getElementById("errorMsg");

    const firstName = document.getElementById("fname").value.trim();
    const lastName = document.getElementById("lname").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    errorMsg.classList.add("hidden");

    if (!firstName || !lastName || !email || !password) {
        errorMsg.innerText = "All fields are required.";
        errorMsg.classList.remove("hidden");
        return;
    }

    const user = { firstName, lastName, email, password };

    try {
        btn.innerText = "Registering...";
        btn.disabled = true;

        const res = await fetch(API + "/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(user)
        });

        if (res.ok) {
            alert("Registered successfully! Please login.");
            window.location = "login.html";
        } else {
            const errorText = await res.text();
            errorMsg.innerText = "Error: " + errorText;
            errorMsg.classList.remove("hidden");
        }
    } catch (err) {
        errorMsg.innerText = "Connection error. Is the backend running?";
        errorMsg.classList.remove("hidden");
        console.error(err);
    } finally {
        btn.innerText = "Register";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
