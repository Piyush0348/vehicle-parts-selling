<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Profile | AutoServe</title>
<meta name="description" content="Manage your AutoServe profile, contact details and registered vehicles.">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 antialiased font-sans">

<nav></nav>
<script type="module" src="../js/navbar.js"></script>

<main class="max-w-5xl mx-auto py-10 px-4 sm:px-6">
    <header class="mb-8">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Account Settings</h1>
        <p class="text-slate-500 mt-1 text-sm">Manage your public profile information and registered vehicles.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- Sidebar avatar -->
        <div class="md:col-span-1">
            <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm p-6 text-center sticky top-24">
                <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4 shadow-md shadow-blue-200">
                    <span id="avatar-initials">U</span>
                </div>
                <h3 id="summary-name" class="text-lg font-bold text-slate-800 truncate">Customer Profile</h3>
                <p id="summary-email" class="text-sm text-slate-500 truncate mb-4">loading...</p>
                <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    Active Customer
                </span>
            </div>
        </div>

        <!-- Main panel -->
        <div class="md:col-span-2 space-y-6">

            <!-- Personal Information -->
            <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden">
                <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <h2 class="font-bold text-slate-800">Personal Information</h2>
                    <span class="text-xs text-slate-400" id="profile-id">ID: #0000</span>
                </div>

                <div class="p-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div class="space-y-1.5">
                            <label for="fname" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">First Name</label>
                            <input type="text" id="fname" placeholder="John" class="w-full px-4 py-2.5 bg-slate-50 focus:bg-white border border-slate-200 focus:border-blue-600 rounded-xl outline-none transition text-slate-800 text-sm font-medium shadow-inner">
                        </div>
                        <div class="space-y-1.5">
                            <label for="lname" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Last Name</label>
                            <input type="text" id="lname" placeholder="Doe" class="w-full px-4 py-2.5 bg-slate-50 focus:bg-white border border-slate-200 focus:border-blue-600 rounded-xl outline-none transition text-slate-800 text-sm font-medium shadow-inner">
                        </div>
                        <div class="space-y-1.5 sm:col-span-2">
                            <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Email Address</label>
                            <input type="email" id="email" placeholder="john.doe@example.com" class="w-full px-4 py-2.5 bg-slate-50 focus:bg-white border border-slate-200 focus:border-blue-600 rounded-xl outline-none transition text-slate-800 text-sm font-medium shadow-inner">
                        </div>
                        <div class="space-y-1.5 sm:col-span-2">
                            <label for="phone" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Phone Number</label>
                            <input type="text" id="phone" placeholder="+1 (555) 000-0000" class="w-full px-4 py-2.5 bg-slate-50 focus:bg-white border border-slate-200 focus:border-blue-600 rounded-xl outline-none transition text-slate-800 text-sm font-medium shadow-inner">
                        </div>
                    </div>
                </div>

                <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                    <button type="button" id="cancelProfileBtn" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 bg-white hover:bg-slate-100 rounded-xl border border-slate-200 transition">Cancel</button>
                    <button id="updateBtn" class="px-5 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 active:scale-[0.98] rounded-xl transition shadow-sm shadow-blue-100">Save Changes</button>
                </div>
            </div>

            <!-- My Vehicles -->
            <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden">
                <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <h2 class="font-bold text-slate-800">My Vehicles</h2>
                    <button id="addVehicleBtn" class="px-4 py-1.5 text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition">+ Add Vehicle</button>
                </div>

                <!-- Vehicle Form (hidden by default) -->
                <div id="vehicle-form-section" class="hidden p-6 border-b border-slate-100 bg-blue-50">
                    <h3 id="vehicle-form-heading" class="text-sm font-bold text-slate-700 mb-4">Add New Vehicle</h3>
                    <input type="hidden" id="vehicle-id">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Vehicle Number</label>
                            <input type="text" id="v-number" placeholder="BA 1 PA 1234" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Make</label>
                            <input type="text" id="v-make" placeholder="Toyota" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Model</label>
                            <input type="text" id="v-model" placeholder="Corolla" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Year</label>
                            <input type="number" id="v-year" placeholder="2020" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Type</label>
                            <select id="v-type" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                                <option value="">Select type</option>
                                <option value="Sedan">Sedan</option>
                                <option value="SUV">SUV</option>
                                <option value="Hatchback">Hatchback</option>
                                <option value="Truck">Truck</option>
                                <option value="Van">Van</option>
                                <option value="Motorcycle">Motorcycle</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Color</label>
                            <input type="text" id="v-color" placeholder="White" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <div id="vehicle-form-error" class="hidden mt-3 text-sm text-red-600 font-medium"></div>
                    <div class="flex gap-3 mt-4">
                        <button id="saveVehicleBtn" class="px-5 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition">Save Vehicle</button>
                        <button id="cancelVehicleBtn" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800 bg-white border border-slate-200 rounded-xl transition">Cancel</button>
                    </div>
                </div>

                <!-- Vehicles List -->
                <div id="vehicles-list" class="divide-y divide-slate-100 p-6">
                    <p id="no-vehicles-msg" class="text-sm text-slate-400">No vehicles registered yet.</p>
                </div>
            </div>

        </div>
    </div>
</main>

<script type="module">
import API from "../js/api.js";
import RBAC from "../js/rbac.js";

if (!RBAC.isAuthenticated()) {
    window.location.href = "login.html";
}

const customerId = RBAC.getUserId();

// ── Profile ──────────────────────────────────────────────
const fname = document.getElementById("fname");
const lname = document.getElementById("lname");
const email = document.getElementById("email");
const phone = document.getElementById("phone");

async function loadProfile() {
    try {
        const data = await API.get(`/profile/me`);
        fname.value = data.firstName || "";
        lname.value = data.lastName || "";
        email.value = data.email || "";
        phone.value = data.phone || "";

        const first = data.firstName || "";
        const last = data.lastName || "";
        document.getElementById("summary-name").textContent = (first || last) ? `${first} ${last}` : "No Name Provided";
        document.getElementById("summary-email").textContent = data.email || "No Email";
        document.getElementById("avatar-initials").textContent = ((first[0] || "") + (last[0] || "U")).toUpperCase();
        document.getElementById("profile-id").textContent = `ID: #${customerId || "0000"}`;
    } catch (err) {
        console.error(err);
    }
}

document.getElementById("cancelProfileBtn").addEventListener("click", loadProfile);

document.getElementById("updateBtn").addEventListener("click", async () => {
    const btn = document.getElementById("updateBtn");
    btn.disabled = true;
    btn.textContent = "Saving...";
    try {
        await API.put(`/profile/me`, {
            firstName: fname.value,
            lastName: lname.value,
            email: email.value,
            phone: phone.value
        });
        alert("Profile updated successfully");
        await loadProfile();
    } catch (err) {
        console.error(err);
        alert("Failed to update profile");
    } finally {
        btn.disabled = false;
        btn.textContent = "Save Changes";
    }
});

// ── Vehicles CRUD ─────────────────────────────────────────
let editingVehicleId = null;

async function loadVehicles() {
    if (!customerId) return;
    try {
        const vehicles = await API.get(`/vehicles/customer/${customerId}`);
        renderVehicles(vehicles);
    } catch (err) {
        console.error("Failed to load vehicles", err);
    }
}

function renderVehicles(vehicles) {
    const list = document.getElementById("vehicles-list");
    const noMsg = document.getElementById("no-vehicles-msg");

    if (!vehicles || vehicles.length === 0) {
        list.innerHTML = `<p id="no-vehicles-msg" class="text-sm text-slate-400">No vehicles registered yet.</p>`;
        return;
    }

    list.innerHTML = vehicles.map(v => `
        <div class="flex items-center justify-between py-3 gap-4" id="vehicle-row-${v.id}">
            <div class="flex items-center gap-4 min-w-0">
                <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zm10 0a2 2 0 11-4 0 2 2 0 014 0zM3 11l2-6h14l2 6M3 11h18M3 11l-1 5h20l-1-5"/></svg>
                </div>
                <div class="min-w-0">
                    <p class="text-sm font-bold text-slate-800">${v.vehicleMake} ${v.vehicleModel} <span class="text-slate-400 font-normal">(${v.manufacturingYear})</span></p>
                    <p class="text-xs text-slate-500">${v.vehicleNumber} · ${v.vehicleType} · ${v.color || "—"}</p>
                </div>
            </div>
            <div class="flex gap-2 flex-shrink-0">
                <button onclick="editVehicle(${v.id})" class="px-3 py-1.5 text-xs font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg transition">Edit</button>
                <button onclick="deleteVehicle(${v.id})" class="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition">Delete</button>
            </div>
        </div>
    `).join("<hr class='border-slate-100'>");
}

document.getElementById("addVehicleBtn").addEventListener("click", () => {
    editingVehicleId = null;
    clearVehicleForm();
    document.getElementById("vehicle-form-heading").textContent = "Add New Vehicle";
    document.getElementById("vehicle-form-section").classList.remove("hidden");
});

document.getElementById("cancelVehicleBtn").addEventListener("click", () => {
    document.getElementById("vehicle-form-section").classList.add("hidden");
    clearVehicleForm();
});

document.getElementById("saveVehicleBtn").addEventListener("click", async () => {
    const errorEl = document.getElementById("vehicle-form-error");
    errorEl.classList.add("hidden");

    const payload = {
        vehicleNumber: document.getElementById("v-number").value.trim(),
        vehicleMake:   document.getElementById("v-make").value.trim(),
        vehicleModel:  document.getElementById("v-model").value.trim(),
        manufacturingYear: parseInt(document.getElementById("v-year").value) || 0,
        vehicleType:   document.getElementById("v-type").value,
        color:         document.getElementById("v-color").value.trim(),
        customerId:    customerId
    };

    if (!payload.vehicleNumber || !payload.vehicleMake || !payload.vehicleModel || !payload.vehicleType) {
        errorEl.textContent = "Please fill in all required fields.";
        errorEl.classList.remove("hidden");
        return;
    }

    const btn = document.getElementById("saveVehicleBtn");
    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
        if (editingVehicleId) {
            await API.put(`/vehicles/${editingVehicleId}`, payload);
        } else {
            await API.post(`/vehicles`, payload);
        }
        document.getElementById("vehicle-form-section").classList.add("hidden");
        clearVehicleForm();
        await loadVehicles();
    } catch (err) {
        console.error(err);
        errorEl.textContent = "Failed to save vehicle. Please try again.";
        errorEl.classList.remove("hidden");
    } finally {
        btn.disabled = false;
        btn.textContent = "Save Vehicle";
    }
});

window.editVehicle = async function(id) {
    try {
        const v = await API.get(`/vehicles/${id}`);
        editingVehicleId = id;
        document.getElementById("vehicle-id").value = id;
        document.getElementById("v-number").value = v.vehicleNumber || "";
        document.getElementById("v-make").value   = v.vehicleMake || "";
        document.getElementById("v-model").value  = v.vehicleModel || "";
        document.getElementById("v-year").value   = v.manufacturingYear || "";
        document.getElementById("v-type").value   = v.vehicleType || "";
        document.getElementById("v-color").value  = v.color || "";
        document.getElementById("vehicle-form-heading").textContent = "Edit Vehicle";
        document.getElementById("vehicle-form-section").classList.remove("hidden");
        document.getElementById("vehicle-form-section").scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (err) {
        console.error(err);
        alert("Failed to load vehicle details.");
    }
};

window.deleteVehicle = async function(id) {
    if (!confirm("Are you sure you want to remove this vehicle?")) return;
    try {
        await API.delete(`/vehicles/${id}`);
        await loadVehicles();
    } catch (err) {
        console.error(err);
        alert("Failed to delete vehicle.");
    }
};

function clearVehicleForm() {
    editingVehicleId = null;
    ["v-number","v-make","v-model","v-year","v-color"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("v-type").value = "";
    document.getElementById("vehicle-form-error").classList.add("hidden");
}

loadProfile();
loadVehicles();
</script>
</body>
</html>
