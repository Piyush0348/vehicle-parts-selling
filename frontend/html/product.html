<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoServe — Parts Inventory</title>
    <link rel="stylesheet" href="../css/product.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>

<nav id="global-nav"></nav>

    <div class="container">

        <!-- ═══ VIEW 1 : CARD LIST ═══ -->
        <section id="view-list" class="view">
            <div class="section-header">
                <h2>All Products</h2>
            </div>
            <div id="product-grid" class="product-grid">
                <!-- Cards injected by JS -->
            </div>
            <p id="no-products" class="empty-msg" style="display:none;">No products found.</p>
        </section>

        <!-- ═══ VIEW 2 : PRODUCT DETAIL ═══ -->
        <section id="view-detail" class="view" style="display:none;">
            <button class="btn-back" onclick="showView('list')">← Back to Products</button>
            <div class="detail-card">
                <img id="detail-img" class="detail-img" src="" alt="">
                <div class="detail-body">
                    <span id="detail-category" class="badge"></span>
                    <h2 id="detail-name"></h2>
                    <p id="detail-price" class="detail-price"></p>
                    <p id="detail-description" class="detail-desc"></p>
                    <div class="detail-actions">
                        <button class="btn btn-edit" id="detail-edit-btn">Edit</button>
                        <button class="btn btn-delete" id="detail-delete-btn">Delete</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ═══ VIEW 3 : CREATE / EDIT FORM ═══ -->
        <section id="view-form" class="view" style="display:none;">
            <button class="btn-back" id="form-back-btn" onclick="showView('list')">← Back</button>
            <div class="form-card">
                <h2 id="form-title">Add New Product</h2>
                <form id="product-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-name">Name</label>
                            <input type="text" id="product-name" placeholder="Product name" required>
                        </div>
                        <div class="form-group">
                            <label for="product-price">Price ($)</label>
                            <input type="number" id="product-price" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-category">Category</label>
                            <input type="text" id="product-category" placeholder="Category" required>
                        </div>
                        <div class="form-group">
                            <label for="product-image">Image URL</label>
                            <input type="url" id="product-image" placeholder="https://example.com/image.jpg">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="product-description">Description</label>
                        <textarea id="product-description" placeholder="Product description" rows="4"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn btn-primary">Add Product</button>
                        <button type="button" class="btn btn-secondary" onclick="showView('list')">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

    </div>

    <script type="module" src="../js/navbar.js"></script>
    <script src="../js/product.js"></script>
</body>
</html>
